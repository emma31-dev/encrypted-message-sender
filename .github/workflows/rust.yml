name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always
  # All Config fields as environment variables
  DATABASE_URL: sqlite:./chat.db?mode=rwc
  IP_ADDRESS: 127.0.0.1
  JWT_SECRET: "test-secret-key-for-ci-only-do-not-use-in-production"
  PORT: 3000
  RUST_LOG: info

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install sqlx-cli (for migrations)
        run: cargo install sqlx-cli --no-default-features --features sqlite

      - name: Create mock database and run migrations
        run: |
          rm -f chat.db
          sqlx migrate run
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Create .env file
        run: |
          cat << EOF > .env
          DATABASE_URL=$DATABASE_URL
          IP_ADDRESS=$IP_ADDRESS
          JWT_SECRET=$JWT_SECRET
          PORT=$PORT
          EOF
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          IP_ADDRESS: ${{ env.IP_ADDRESS }}
          JWT_SECRET: ${{ env.JWT_SECRET }}
          PORT: ${{ env.PORT }}

      - name: Build
        run: cargo build --release

      - name: Start server in background
        run: |
          cargo run --release &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
          sleep 3

      - name: Wait for server to be ready (health check)
        run: |
          for i in {1..10}; do
            if curl -s -f http://localhost:${{ env.PORT }}/healthz; then
              echo "Server ready"
              exit 0
            fi
            echo "Waiting... (attempt $i)"
            sleep 2
          done
          echo "Server failed to start"
          exit 1

      - name: Test health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:${{ env.PORT }}/healthz)
          test "$STATUS" = "200"

      - name: Stop server
        if: always()
        run: kill ${{ env.SERVER_PID }} || true

      - name: Run cargo test
        run: cargo test